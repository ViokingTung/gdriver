name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

env:
  CARGO_TERM_COLOR: always
  APP_NAME: gDriver

jobs:
  # ═══════════════════════════════════════════════════════════════════════
  # Linux — Build .deb, .rpm, .AppImage
  # ═══════════════════════════════════════════════════════════════════════
  build-linux:
    name: Build Linux Packages
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [deb, rpm, appimage]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libappindicator3-dev librsvg2-dev \
            libfuse3-dev patchelf libssl-dev mold \
            libjavascriptcoregtk-4.1-dev libsoup-3.0-dev

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Build daemon
        run: cargo build -p gdriver-daemon --release

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app (${{ matrix.target }})
        working-directory: apps/gdriver-app
        run: cargo tauri build --bundles ${{ matrix.target }}

      - name: Run Linux packaging helper
        if: matrix.target == 'deb'
        run: bash packaging/linux/build.sh deb

      - name: Collect artifacts
        run: |
          mkdir -p dist/linux
          find target/release/bundle -type f \
            \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \) \
            -exec cp {} dist/linux/ \; 2>/dev/null || true
          find apps/gdriver-app/src-tauri/target/release/bundle -type f \
            \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \) \
            -exec cp {} dist/linux/ \; 2>/dev/null || true

      - name: Generate SHA-256 checksums
        run: |
          cd dist/linux
          for f in *; do
            [ -f "$f" ] && sha256sum "$f" >> SHA256SUMS
          done
          cat SHA256SUMS

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v6
        with:
          name: linux-packages-${{ matrix.target }}
          path: dist/linux/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════
  # Windows — Build NSIS .exe installer
  # ═══════════════════════════════════════════════════════════════════════
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build and package (NSIS)
        shell: pwsh
        run: |
          # GitHub's NSIS binary-releases contains a STUB makensis.exe (~2.5KB).
          # NSIS.exe is the real console compiler (~91KB).
          # Strategy: let Tauri download NSIS (fails on stub), replace, retry.

          $nsisCache = "$env:LOCALAPPDATA\tauri\NSIS"
          if (Test-Path $nsisCache) { Remove-Item -Recurse -Force $nsisCache }

          # Attempt 1: let Tauri download NSIS (will fail on stub)
          Write-Host "=== Attempt 1: trigger NSIS download ==="
          try {
            ./packaging/windows/build.ps1 -SkipSign -BuildMode nsis
          } catch {
            Write-Host "Attempt 1 failed (expected): $_"
          }
          Write-Host "Attempt 1 done"

          # The downloaded NSIS has a stub makensis.exe (2.5KB) and a GUI NSIS.exe.
          # Neither works as a console compiler. Download the real makensis.exe
          # from the NSIS installer (which contains the actual compiler).
          Write-Host "=== Downloading real makensis.exe ==="
          $nsisCache = "$env:LOCALAPPDATA\tauri\NSIS"
          $nsisInstaller = "$env:TEMP\nsis-3.11-setup.exe"
          $nsisUrl = "https://sourceforge.net/projects/nsis/files/NSIS%203/3.11/nsis-3.11-setup.exe/download"
          Write-Host "Downloading NSIS installer..."
          curl.exe -L -o $nsisInstaller $nsisUrl
          $installerSize = (Get-Item $nsisInstaller).Length
          Write-Host "Installer size: $installerSize bytes"

          # Extract using 7z (available on GitHub Actions runners)
          $extractDir = "$env:TEMP\nsis-installer-extract"
          if (Test-Path $extractDir) { Remove-Item -Recurse -Force $extractDir }
          7z x $nsisInstaller -o"$extractDir" -y | Out-Null

          # List all .exe files to find the real compiler
          Write-Host "=== Extracted executables ==="
          Get-ChildItem $extractDir -Filter "*.exe" -Recurse |
            Select-Object FullName, Length |
            Format-Table -AutoSize

          # Find the real makensis.exe (should be > 100KB)
          $realMakensis = Get-ChildItem $extractDir -Filter "makensis.exe" -Recurse |
            Where-Object { $_.Length -gt 100000 } |
            Select-Object -First 1

          if ($realMakensis) {
            Write-Host "Found real makensis.exe: $($realMakensis.FullName) ($($realMakensis.Length) bytes)"
            Copy-Item $realMakensis.FullName "$nsisCache\makensis.exe" -Force
            New-Item -ItemType Directory -Force -Path "$nsisCache\Bin" | Out-Null
            Copy-Item $realMakensis.FullName "$nsisCache\Bin\makensis.exe" -Force
            # Copy zlib1.dll dependency
            $zlibSrc = Join-Path $realMakensis.Directory "zlib1.dll"
            if (Test-Path $zlibSrc) {
              Copy-Item $zlibSrc "$nsisCache\zlib1.dll" -Force
              Copy-Item $zlibSrc "$nsisCache\Bin\zlib1.dll" -Force
              Write-Host "Copied zlib1.dll"
            }
            # makensis.exe looks for Stubs/Include/Plugins in its PARENT directory
            # (NSISDIR is removed by Tauri). Copy resources to parent.
            $nsisParent = Split-Path $nsisCache
            foreach ($dir in @("Stubs", "Include", "Plugins")) {
              $src = Join-Path $nsisCache $dir
              $dst = Join-Path $nsisParent $dir
              if ((Test-Path $src) -and -not (Test-Path $dst)) {
                Copy-Item $src $dst -Recurse -Force
                Write-Host "Copied $dir to parent directory"
              }
            }
            Write-Host "Replaced stub with real compiler"
          } else {
            # Try NSIS.exe if makensis.exe not found large enough
            $realNsis = Get-ChildItem $extractDir -Filter "NSIS.exe" -Recurse |
              Where-Object { $_.Length -gt 100000 } |
              Select-Object -First 1
            if ($realNsis) {
              Write-Host "Found NSIS.exe: $($realNsis.FullName) ($($realNsis.Length) bytes)"
              Copy-Item $realNsis.FullName "$nsisCache\makensis.exe" -Force
              New-Item -ItemType Directory -Force -Path "$nsisCache\Bin" | Out-Null
              Copy-Item $realNsis.FullName "$nsisCache\Bin\makensis.exe" -Force
              $zlibSrc = Join-Path $realNsis.Directory "zlib1.dll"
              if (Test-Path $zlibSrc) {
                Copy-Item $zlibSrc "$nsisCache\zlib1.dll" -Force
                Copy-Item $zlibSrc "$nsisCache\Bin\zlib1.dll" -Force
              }
              $nsisParent = Split-Path $nsisCache
              foreach ($dir in @("Stubs", "Include", "Plugins")) {
                $src = Join-Path $nsisCache $dir
                $dst = Join-Path $nsisParent $dir
                if ((Test-Path $src) -and -not (Test-Path $dst)) {
                  Copy-Item $src $dst -Recurse -Force
                }
              }
            } else {
              Write-Host "ERROR: Could not find real NSIS compiler"
              Get-ChildItem $extractDir -Filter "*.exe" -Recurse |
                ForEach-Object { Write-Host "  $($_.FullName): $($_.Length) bytes" }
              throw "No real NSIS compiler found"
            }
          }

          # Verify
          $finalSize = (Get-Item "$nsisCache\makensis.exe").Length
          Write-Host "Final makensis.exe size: $finalSize bytes"

          # Test if the compiler actually runs
          Write-Host "=== Testing makensis.exe ==="
          try {
            $output = & "$nsisCache\makensis.exe" /VERSION 2>&1
            Write-Host "makensis /VERSION output: $output"
          } catch {
            Write-Host "makensis /VERSION failed: $_"
          }

          # Check DLL dependencies with dumpbin
          Write-Host "=== Checking DLL dependencies ==="
          $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (Test-Path $vsWhere) {
            $vsPath = & $vsWhere -latest -property installationPath
            $dumpbin = Join-Path $vsPath "VC\Tools\MSVC\*\bin\Hostx64\x64\dumpbin.exe"
            $dumpbin = Get-Item $dumpbin | Select-Object -First 1
            if ($dumpbin) {
              & $dumpbin.FullName /dependents "$nsisCache\makensis.exe" 2>&1 | Select-Object -First 20
            }
          }

          # Attempt 2: build with real compiler
          Write-Host "=== Attempt 2: build with real compiler ==="
          ./packaging/windows/build.ps1 -SkipSign -BuildMode nsis
          if ($LASTEXITCODE -ne 0) { throw "Build failed with exit code $LASTEXITCODE" }

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/windows
          Get-ChildItem -Path "target/release/bundle/nsis" -Filter "*.exe" -ErrorAction SilentlyContinue |
            Copy-Item -Destination dist/windows/
          Get-ChildItem -Path "apps/gdriver-app/src-tauri/target/release/bundle/nsis" -Filter "*.exe" -ErrorAction SilentlyContinue |
            Copy-Item -Destination dist/windows/

      - name: Generate SHA-256 checksums
        shell: pwsh
        run: |
          cd dist/windows
          Get-ChildItem * | ForEach-Object {
            $hash = (Get-FileHash $_.Name -Algorithm SHA256).Hash
            "$hash  $($_.Name)" | Out-File -Append SHA256SUMS.txt
          }
          Get-Content SHA256SUMS.txt

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v6
        with:
          name: windows-packages
          path: dist/windows/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════
  # macOS — Build .dmg
  # ═══════════════════════════════════════════════════════════════════════
  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-cargo-

      - name: Build daemon (universal)
        run: |
          cargo build -p gdriver-daemon --release --target x86_64-apple-darwin
          cargo build -p gdriver-daemon --release --target aarch64-apple-darwin
          mkdir -p target/release
          lipo -create \
            target/x86_64-apple-darwin/release/gdriver-daemon \
            target/aarch64-apple-darwin/release/gdriver-daemon \
            -output target/release/gdriver-daemon
          file target/release/gdriver-daemon

      - name: Build Swift extensions
        run: |
          cd extensions/findersync
          swift build -c release --arch x86_64 --arch arm64
          cd ../fileprovider
          swift build -c release --arch x86_64 --arch arm64
        continue-on-error: true

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        working-directory: apps/gdriver-app
        run: cargo tauri build --bundles app

      - name: Embed components & create DMG
        run: bash packaging/macos/build.sh --skip-sign --skip-notarize --skip-build

      - name: Collect artifacts
        run: |
          mkdir -p dist/macos
          find target/release/bundle/macos -name "*.dmg" \
            -exec cp {} dist/macos/ \; 2>/dev/null || true
          find apps/gdriver-app/src-tauri/target/release/bundle/macos -name "*.dmg" \
            -exec cp {} dist/macos/ \; 2>/dev/null || true
          # Fallback: also check legacy dmg path
          find target/release/bundle/dmg -name "*.dmg" \
            -exec cp {} dist/macos/ \; 2>/dev/null || true
          find apps/gdriver-app/src-tauri/target/release/bundle/dmg -name "*.dmg" \
            -exec cp {} dist/macos/ \; 2>/dev/null || true

      - name: Generate SHA-256 checksums
        run: |
          cd dist/macos
          for f in *; do
            [ -f "$f" ] && shasum -a 256 "$f" >> SHA256SUMS
          done
          cat SHA256SUMS

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v6
        with:
          name: macos-packages
          path: dist/macos/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════
  # Create GitHub Release and upload all artifacts
  # ═══════════════════════════════════════════════════════════════════════
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos]
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts

      - name: Flatten artifact structure
        run: |
          mkdir -p release-assets
          find artifacts -type f -not -name "SHA256SUMS*" | while read f; do
            cp "$f" "release-assets/$(basename "$f")"
          done
          ls -la release-assets/

      - name: Generate combined SHA-256 checksums
        run: |
          cd release-assets
          sha256sum * 2>/dev/null > SHA256SUMS || true
          for f in *; do
            [ -f "$f" ] && sha256sum "$f" >> SHA256SUMS
          done
          # Deduplicate
          sort -u SHA256SUMS -o SHA256SUMS
          cat SHA256SUMS

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "gDriver ${{ steps.version.outputs.version }}"
          body: |
            ## gDriver ${{ steps.version.outputs.version }}

            ### Linux
            - `gdriver_*.deb` — Debian / Ubuntu
            - `gdriver_*.rpm` — Fedora / RHEL
            - `gdriver_*.AppImage` — Universal Linux

            ### Windows
            - `gDriver_*_x64-setup.exe` — Windows 10/11 x64 Installer

            ### macOS
            - `gDriver_*.dmg` — macOS 12+ (Universal: Intel + Apple Silicon)

            ### Verification
            SHA-256 checksums are provided in `SHA256SUMS`.

            ```
            ${{ steps.version.outputs.version }}
            ```
          draft: false
          prerelease: false
          files: release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
