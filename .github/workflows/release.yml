name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

env:
  CARGO_TERM_COLOR: always
  APP_NAME: gDriver

jobs:
  # ═══════════════════════════════════════════════════════════════════════
  # Linux — Build .deb, .rpm, .AppImage
  # ═══════════════════════════════════════════════════════════════════════
  build-linux:
    name: Build Linux Packages
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [deb, rpm, appimage]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libappindicator3-dev librsvg2-dev \
            libfuse3-dev patchelf libssl-dev mold \
            libjavascriptcoregtk-4.1-dev libsoup-3.0-dev

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Build daemon
        run: cargo build -p gdriver-daemon --release

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app (${{ matrix.target }})
        working-directory: apps/gdriver-app
        run: cargo tauri build --bundles ${{ matrix.target }}

      - name: Run Linux packaging helper
        if: matrix.target == 'deb'
        run: bash packaging/linux/build.sh deb

      - name: Collect artifacts
        run: |
          mkdir -p dist/linux
          find target/release/bundle -type f \
            \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \) \
            -exec cp {} dist/linux/ \; 2>/dev/null || true
          find apps/gdriver-app/src-tauri/target/release/bundle -type f \
            \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \) \
            -exec cp {} dist/linux/ \; 2>/dev/null || true

      - name: Generate SHA-256 checksums
        run: |
          cd dist/linux
          shopt -s nullglob
          for f in *; do
            [ -f "$f" ] && sha256sum "$f" >> SHA256SUMS
          done
          if [ -f SHA256SUMS ]; then
            cat SHA256SUMS
          else
            echo "No artifacts to checksum"
          fi

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v6
        with:
          name: linux-packages-${{ matrix.target }}
          path: dist/linux/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════
  # Windows — Build NSIS .exe installer
  # ═══════════════════════════════════════════════════════════════════════
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Setup NSIS compiler
        shell: pwsh
        run: |
          # Tauri v2 downloads a stub makensis.exe (~2.5KB) from GitHub that
          # cannot compile installers. We pre-populate the Tauri NSIS cache
          # with the real NSIS compiler so Tauri doesn't need to download.
          # build.ps1 also has a manual-compilation fallback as a safety net.

          $nsisCache = "$env:LOCALAPPDATA\tauri\NSIS"

          # Create directories
          New-Item -ItemType Directory -Force -Path $nsisCache | Out-Null
          New-Item -ItemType Directory -Force -Path "$nsisCache\Bin" | Out-Null

          # Download real NSIS 3.11 from SourceForge and extract with 7z
          Write-Host "=== Downloading NSIS 3.11 installer ==="
          $nsisInstaller = "$env:TEMP\nsis-3.11-setup.exe"
          $extractDir = "$env:TEMP\nsis-installer-extract"
          if (-not (Test-Path $extractDir)) {
            curl.exe -L -o $nsisInstaller "https://sourceforge.net/projects/nsis/files/NSIS%203/3.11/nsis-3.11-setup.exe/download"
            Write-Host "Installer size: $((Get-Item $nsisInstaller).Length) bytes"
            Remove-Item -Recurse -Force $extractDir -ErrorAction SilentlyContinue
            7z x $nsisInstaller -o"$extractDir" -y | Out-Null
          }

          # Copy ALL NSIS files to the Tauri cache directory
          Write-Host "=== Populating NSIS cache ==="
          Copy-Item "$extractDir\*" $nsisCache -Recurse -Force
          Write-Host "Copied NSIS files to cache"

          # Download nsis_tauri_utils.dll AFTER copying NSIS files
          # (must be after so it's not overwritten by the NSIS extraction's Plugins dir)
          $tauriUtilsUrl = "https://github.com/tauri-apps/nsis-tauri-utils/releases/download/nsis_tauri_utils-v0.5.3/nsis_tauri_utils.dll"
          $tauriUtilsDir = "$nsisCache\Plugins\x86-unicode\additional"
          New-Item -ItemType Directory -Force -Path $tauriUtilsDir | Out-Null
          $tauriUtilsDll = "$tauriUtilsDir\nsis_tauri_utils.dll"
          Write-Host "Downloading nsis_tauri_utils.dll..."
          curl.exe -L -o $tauriUtilsDll $tauriUtilsUrl
          Write-Host "  size: $((Get-Item $tauriUtilsDll).Length) bytes"

          # Replace stub root makensis.exe with real Bin\makensis.exe
          $realCompiler = "$nsisCache\Bin\makensis.exe"
          if ((Test-Path $realCompiler) -and ((Get-Item $realCompiler).Length -gt 100000)) {
            Copy-Item $realCompiler "$nsisCache\makensis.exe" -Force
            Write-Host "Replaced stub makensis.exe with real compiler ($((Get-Item $realCompiler).Length) bytes)"
          } else {
            Write-Host "WARNING: Real makensis.exe not found at $realCompiler"
          }

          # Copy zlib1.dll alongside makensis.exe (DLL dependency)
          $zlibInCache = "$nsisCache\Bin\zlib1.dll"
          $zlibInExtract = "$extractDir\Bin\zlib1.dll"
          if (Test-Path $zlibInCache) {
            # Already in Bin from extraction copy; just ensure root copy exists
            if (-not (Test-Path "$nsisCache\zlib1.dll")) {
              Copy-Item $zlibInCache "$nsisCache\zlib1.dll" -Force
            }
          } elseif (Test-Path $zlibInExtract) {
            Copy-Item $zlibInExtract "$nsisCache\zlib1.dll" -Force
            Copy-Item $zlibInExtract "$nsisCache\Bin\zlib1.dll" -Force
          }

          # Copy NSIS resources to PARENT directory (%LOCALAPPDATA%\tauri\).
          # When Tauri removes NSISDIR env var, the real Bin\makensis.exe
          # (copied to root) resolves Stubs/Include/Plugins/Contrib relative
          # to its own directory. The Bin\makensis.exe binary goes UP one
          # level (to the parent), so resources must exist in both locations.
          $nsisParent = "$env:LOCALAPPDATA\tauri"
          Write-Host "=== Copying NSIS resources to parent: $nsisParent ==="
          foreach ($dir in @("Stubs", "Include", "Plugins", "Contrib")) {
            $src = "$extractDir\$dir"
            $dst = "$nsisParent\$dir"
            if (Test-Path $src) {
              Copy-Item $src $dst -Recurse -Force
              Write-Host "  Copied $dir to $dst"
            } else {
              Write-Host "  WARNING: $src not found in extract"
            }
          }

          # Copy nsis_tauri_utils.dll to parent Plugins as well
          if (Test-Path $tauriUtilsDll) {
            $parentUtilsDir = "$nsisParent\Plugins\x86-unicode\additional"
            New-Item -ItemType Directory -Force -Path $parentUtilsDir | Out-Null
            Copy-Item $tauriUtilsDll "$parentUtilsDir\nsis_tauri_utils.dll" -Force
            Write-Host "  Copied nsis_tauri_utils.dll to parent Plugins"
          }

          # Test the compiler
          Write-Host "=== Testing makensis.exe ==="
          $version = & "$nsisCache\makensis.exe" /VERSION 2>&1
          Write-Host "makensis /VERSION: $version"

      - name: Build and package (NSIS)
        shell: pwsh
        run: |
          ./packaging/windows/build.ps1 -SkipSign -BuildMode nsis
          if ($LASTEXITCODE -ne 0) { throw "Build failed with exit code $LASTEXITCODE" }

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/windows
          Get-ChildItem -Path "target/release/bundle/nsis" -Filter "*.exe" -ErrorAction SilentlyContinue |
            Copy-Item -Destination dist/windows/
          Get-ChildItem -Path "apps/gdriver-app/src-tauri/target/release/bundle/nsis" -Filter "*.exe" -ErrorAction SilentlyContinue |
            Copy-Item -Destination dist/windows/

      - name: Generate SHA-256 checksums
        shell: pwsh
        run: |
          cd dist/windows
          $files = Get-ChildItem -File -ErrorAction SilentlyContinue
          if ($files) {
            $files | ForEach-Object {
              $hash = (Get-FileHash $_.Name -Algorithm SHA256).Hash
              "$hash  $($_.Name)" | Out-File -Append SHA256SUMS.txt
            }
            Get-Content SHA256SUMS.txt
          } else {
            Write-Host "No artifacts to checksum"
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v6
        with:
          name: windows-packages
          path: dist/windows/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════
  # macOS — Build .dmg
  # ═══════════════════════════════════════════════════════════════════════
  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-cargo-

      - name: Build daemon (universal)
        run: |
          cargo build -p gdriver-daemon --release --target x86_64-apple-darwin
          cargo build -p gdriver-daemon --release --target aarch64-apple-darwin
          mkdir -p target/release
          lipo -create \
            target/x86_64-apple-darwin/release/gdriver-daemon \
            target/aarch64-apple-darwin/release/gdriver-daemon \
            -output target/release/gdriver-daemon
          file target/release/gdriver-daemon

      - name: Build Swift extensions
        run: |
          cd extensions/findersync
          swift build -c release --arch x86_64 --arch arm64
          cd ../fileprovider
          swift build -c release --arch x86_64 --arch arm64
        continue-on-error: true

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        working-directory: apps/gdriver-app
        run: cargo tauri build --bundles app

      - name: Embed components & create DMG
        run: bash packaging/macos/build.sh --skip-sign --skip-notarize --skip-build

      - name: Collect artifacts
        run: |
          mkdir -p dist/macos
          find target/release/bundle/macos -name "*.dmg" \
            -exec cp {} dist/macos/ \; 2>/dev/null || true
          find apps/gdriver-app/src-tauri/target/release/bundle/macos -name "*.dmg" \
            -exec cp {} dist/macos/ \; 2>/dev/null || true
          # Fallback: also check legacy dmg path
          find target/release/bundle/dmg -name "*.dmg" \
            -exec cp {} dist/macos/ \; 2>/dev/null || true
          find apps/gdriver-app/src-tauri/target/release/bundle/dmg -name "*.dmg" \
            -exec cp {} dist/macos/ \; 2>/dev/null || true

      - name: Generate SHA-256 checksums
        run: |
          cd dist/macos
          shopt -s nullglob
          for f in *; do
            [ -f "$f" ] && shasum -a 256 "$f" >> SHA256SUMS
          done
          if [ -f SHA256SUMS ]; then
            cat SHA256SUMS
          else
            echo "No artifacts to checksum"
          fi

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v6
        with:
          name: macos-packages
          path: dist/macos/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════
  # Create GitHub Release and upload all artifacts
  # ═══════════════════════════════════════════════════════════════════════
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos]
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts

      - name: Flatten artifact structure
        run: |
          mkdir -p release-assets
          find artifacts -type f -not -name "SHA256SUMS*" | while read f; do
            cp "$f" "release-assets/$(basename "$f")"
          done
          ls -la release-assets/

      - name: Generate combined SHA-256 checksums
        run: |
          cd release-assets
          sha256sum * 2>/dev/null > SHA256SUMS || true
          for f in *; do
            [ -f "$f" ] && sha256sum "$f" >> SHA256SUMS
          done
          # Deduplicate
          sort -u SHA256SUMS -o SHA256SUMS
          cat SHA256SUMS

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "gDriver ${{ steps.version.outputs.version }}"
          body: |
            ## gDriver ${{ steps.version.outputs.version }}

            ### Linux
            - `gdriver_*.deb` — Debian / Ubuntu
            - `gdriver_*.rpm` — Fedora / RHEL
            - `gdriver_*.AppImage` — Universal Linux

            ### Windows
            - `gDriver_*_x64-setup.exe` — Windows 10/11 x64 Installer

            ### macOS
            - `gDriver_*.dmg` — macOS 12+ (Universal: Intel + Apple Silicon)

            ### Verification
            SHA-256 checksums are provided in `SHA256SUMS`.

            ```
            ${{ steps.version.outputs.version }}
            ```
          draft: false
          prerelease: false
          files: release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
