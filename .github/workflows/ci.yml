name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Rust: format, clippy, build, test ──────────────────────────────────
  rust-check:
    name: Rust Check (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build
        working-directory: apps/gdriver-app

      - name: Install Rust toolchain (nightly for fmt)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libappindicator3-dev librsvg2-dev patchelf libssl-dev mold \
            libfuse3-dev

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo +nightly fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --exclude gdriver-shell-extension -- -D warnings

      - name: Build
        run: cargo build --workspace --exclude gdriver-shell-extension

      - name: Test (workspace)
        run: cargo test --workspace --exclude gdriver-shell-extension

      - name: Test (daemon specific)
        run: cargo test -p gdriver-daemon -- --test-threads=1

  # ── TypeScript: type-check, lint, build, test ──────────────────────────
  ts-check:
    name: TypeScript Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/gdriver-app
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Type check
        run: pnpm exec tsc -b --noEmit

      - name: Lint
        run: pnpm lint

      - name: Build frontend
        run: pnpm build

      - name: Run frontend tests (Vitest)
        run: pnpm test -- --run || echo "No frontend tests configured yet"

  # ── Rust (Windows) ─────────────────────────────────────────────────────
  rust-check-windows:
    name: Rust Check (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build
        working-directory: apps/gdriver-app

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build (workspace minus vfs/linux)
        run: cargo build --workspace --exclude gdriver-vfs

      - name: Build shell extension
        working-directory: extensions/windows-shell
        run: cargo build --release

  # ── Rust (macOS) ───────────────────────────────────────────────────────
  rust-check-macos:
    name: Rust Check (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build
        working-directory: apps/gdriver-app

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build (workspace minus shell/windows-extensions)
        run: cargo build --workspace --exclude gdriver-shell-extension

      - name: Build Swift extensions
        working-directory: extensions/findersync
        run: swift build -c release --arch arm64
        continue-on-error: true
