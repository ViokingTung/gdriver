name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: What happened and what did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps so we can reproduce the behavior.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows 10
        - Windows 11
        - macOS 13 (Ventura)
        - macOS 14 (Sonoma)
        - macOS 15 (Sequoia)
        - Ubuntu
        - Fedora
        - Arch Linux
        - Debian
        - Other (describe below)
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: gDriver version
      placeholder: "e.g. 0.1.0"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: |
        Paste relevant log output or screenshots.
        Logs are at:
        - Linux: `~/.local/share/gdriver/logs/`
        - macOS: `~/Library/Application Support/gdriver/logs/`
        - Windows: `%APPDATA%\gdriver\logs\`
  - type: checkboxes
    id: search
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and this has not been reported yet
          required: true
